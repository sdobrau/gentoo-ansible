# wayland support TODO: what?

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = XDG_PICTURES_DIR,$HOME/Pictures

# start

# for hyprshade https://github.com/loqusion/hyprshade
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE

bind = Super, v, exec, cliphist list | tofi | cliphist decode | wl-copy
bind = Super SHIFT, v, exec, cliphist wipe

bind = Super, w, exec, hyprctl dispatch focuswindow address:"$(hyprctl -j clients | jq 'map("\(.workspace.id) ∴ \(.workspace.name) | \(.title) | \(.address)")' | sed "s/,$//; s/^\[//; s/^\]//; s/^[[:blank:]]*//; s/^\"//; s/\"$//" | grep -v "^$" | tofi --prompt-text='w: ' -c ~/.config/tofi/config-window | grep -o "0x.*$")"
bind = Super, r, exec, tofi-drun

bind = Super, P, exec, YDOTOOL_SOCKET=/tmp/.ydotool_socket ydotool type tes
bind = Super, F, fullscreen,
#bind = Super, M, exit,
bind = Super, E, exec, $fileManager
bind = Super, end, exec, waylock

bind = Super CTRL, f, togglefloating,

# Move focus with mainMod + arrow keys
bind = Super, h, movefocus, l
bind = Super, l, movefocus, r
bind = Super, k, movefocus, u
bind = Super, j, movefocus, d
##bind = Super, SPACE, togglesplit
# TODO: picture
bind = Super, p, exec, cd $HOME/media/screenshots/ && hyprctl -j activewindow | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"' | grim -g - screenshot-$(date).png
# Switch workspaces with mainMod + [0-9]
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10
bind = Super, s, exec, cd

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = Super SHIFT, 1, movetoworkspace, 1
bind = Super SHIFT, 2, movetoworkspace, 2
bind = Super SHIFT, 3, movetoworkspace, 3
bind = Super SHIFT, 4, movetoworkspace, 4
bind = Super SHIFT, 5, movetoworkspace, 5
bind = Super SHIFT, 6, movetoworkspace, 6
bind = Super SHIFT, 7, movetoworkspace, 7
bind = Super SHIFT, 8, movetoworkspace, 8
bind = Super SHIFT, 9, movetoworkspace, 9
bind = Super SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = Super, S, togglespecialworkspace, magic
# bind = Super SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = Super, mouse_down, workspace, e+1
bind = Super, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = Super, comma, movewindow
#bindm = Super, period, resizewindow
bind = Super SHIFT, minus, moveoutofgroup
bind = Super, g, togglegroup

bind = Super SHIFT, h, changegroupactive, b
bind = Super, mouse_up, changegroupactive, b
bind = Super SHIFT, l, changegroupactive, f
bind = Super, mouse_down, changegroupactive, f

bind = Super ALT, h, movewindoworgroup, l
bind = Super ALT, l, movewindoworgroup, r
bind = Super ALT, k, movewindoworgroup, u
bind = Super ALT, j, movewindoworgroup, d

bind = Super, q, cyclenext
bind = Super SHIFT, q, cyclenext, prev
bind = Super CTRL, h, resizeactive, -250 0
bind = Super CTRL, l, resizeactive, 250 0
bind = Super CTRL, K, resizeactive, 0 -250
bind = Super CTRL, j, resizeactive, 0 250

bind = Super, period, killactive # toggle the layout
bind = Super, C, exec, pypr layout_center toggle # killactive,
## focus change keys
#bind = Super, n, exec, pypr layout_center next
#bind = Super, b, exec, pypr fetch_client_menu
# TODO: screenshot
bind = Super CTRL, 1, exec, grim -c "/home/sdobrau/media/screens/gscreenshot-$(date).png-$((RANDOM))"
bind = Super CTRL, 2, exec, grim -c -g "$(slurp -d)" "/home/sdobrau/media/screens/screenshot.png-$((RANDOM))"
bind = Super CTRL, 3, exec, grim -g "$(slurp -d)" - | wl-copy

# Laptop multimedia keys for volume and LCD brightness
# TODO: wtf left volume not working unless right first
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume 1 +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume 1 -5%

bind = SUPER, p, exec, mpc toggle
bindel = , XF86AudioMute, exec, pactl set-sink-mute 1 toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioPlay, exec, mpc toggle
bindl = , XF86AudioPrev, exec, mpc prev
bindl = , XF86AudioNext, exec, mpc next

###############
# WM SETTINGS #
###############

general {
  resize_on_border=true
  extend_border_grab_area=30
  gaps_in=50
  gaps_out=50
  col.active_border = 0x3322ff00
  col.inactive_border = 0x1122ff00
}

decoration {
  active_opacity = 0.95
  inactive_opacity = 0.9
  blur {
    enabled=false
  }
}

animations {
  enabled = no
}

master {
  allow_small_split = true
}

input {
  kb_options = ctrl:nocaps
}

dwindle {
  # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
  pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = yes # you probably want this
}

misc {
  disable_hyprland_logo=true
  font_family=monospace
}

render {
  direct_scanout=false
}

group {
#   col.border_active = "green"
   groupbar {
     height = 15
     col.active = 0x3322ff00
     col.inactive = 0x1122ff00
     col.locked_active = 0x1122ff00
     gaps_in = 0
     gaps_out = 0
     font_size = 11
     stacked = false
     gradients = true
   }
}

cursor {
  inactive_timeout=1
  enable_hyprcursor=false
  hide_on_key_press=false
  persistent_warps=true
  warp_on_change_workspace=true
}

###########
# plugins #
###########

plugin {
  hyprbars {
    # example config
    bar_height = 15
    bar_color = rgba(0,0,0,0.8)
    bar_text_font = monospace
    bar_text_size = 9
    bar_part_of_window = yes
    bar_precedence_over_border = yes
    # example buttons (R -> L)
    # hyprbars-button = color, size, icon, on-click
    # hyprbars-button = rgb(333333), 15, , hyprctl nil
    # hyprbars-button = rgb(eeee11), 10, , hyprctl dispatch fullscreen 1
  }
}


# sort

bind = Super CTRL, c, exec, nmcli c down VM9680303 && nmcli c up VM9680303 && nmcli c down VM9680303\ 1 && nmcli c up VM9680303
bind = Super CTRL, x, exec, rfkill toggle all
bind = Super CTRL, n, exec, mpc | head -1 | wl-copy
bind = Super SHIFT, w, exec, ~/bin/wall-auto.sh
bind = Super SHIFT, p, exec, env DISPLAY=:0 stepmania

# monitor settings
monitor= HDMI-A-1, 1920x1200@60, 0x0, 1
monitor= HDMI-A-2, 1920x1080@60, 1920x0, 1, transform, 3
