profile=fast
video-sync=audio
geometry=50%:50%
autofit-larger=80%x80%
panscan=0.0
alang=Japanese,jpn,jp,Korean,kor,ko,English,eng,en
slang=eng,English,en,en-US,US
audio-pitch-correction=no
# normal top-level option
#fullscreen=yes

################
# sub settings #
################

#profile=sub-oneplus
#profile=sub-clear
#profile=sub-medium

sub-scale-with-window=yes
sub-ass-scale-with-window=yes
sub-scale=0.7
sub-fix-timing=yes
blend-subtitles=yes

osd-border-size=1.0
osd-color='#eeffffff'
osd-border-color='#dd1c1b22'
osd-shadow-offset=0.0
osd-blur=0.2
border=no
interpolation=yes
no-osc
no-osd-bar
osd-duration=500

keep-open
snap-window

loop-file=no
loop-playlist=no
