[DEFAULT]
main-repo = gentoo

[gentoo]
location = /var/db/repos/gentoo
sync-type = rsync
sync-uri = rsync://rsync.gentoo.org/gentoo-portage
auto-sync = yes
sync-openpgp-keyserver = hkps://keys.gentoo.org
sync-openpgp-key-refresh-retry-count = 100
sync-openpgp-key-refresh-retry-overall-timeout = 1800
sync-openpgp-key-refresh-retry-delay-exp-base = 4
sync-openpgp-key-refresh-retry-delay-max = 120
sync-openpgp-key-refresh-retry-delay-mult = 8
sync-git-verify-commit-signature = true

